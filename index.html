<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>MQTT Auto Client</title>

  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      margin: 0;
      padding: 20px;
    }

    h1 {
      margin-bottom: 5px;
    }

    .container {
      max-width: 800px;
      margin: auto;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 15px;
      margin-bottom: 15px;
      box-shadow: 0 3px 10px rgba(0,0,0,0.1);
    }

    #status {
      font-weight: bold;
    }

    #log {
      max-height: 400px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    .message {
      padding: 10px;
      border-radius: 8px;
      margin-bottom: 10px;
      border-left: 5px solid #0078D4;
      background: #f9fbfd;
      animation: fadeIn 0.2s ease-in;
    }

    .meta {
      font-size: 12px;
      color: #555;
      margin-bottom: 5px;
    }

    .payload {
      font-family: monospace;
      font-size: 14px;
      color: #222;
    }

    .system {
      border-left-color: #888;
      background: #eee;
    }

    .error {
      border-left-color: red;
      background: #ffeaea;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-5px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

<body>

<div class="container">

  <h1>Forum Technologiczne</h1>
  <div class="card">
    <h3>MQTT Client</h3>
    <div id="status">Łączenie...</div>
  </div>

  <div class="card">
    <h3>Wiadomości</h3>
    <div id="log"></div>
  </div>

</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const topic = params.get("topic") || "/pxcpl/ft";

  const logDiv = document.getElementById("log");

  function addMessage(text, type = "normal") {
    const wrapper = document.createElement("div");
    wrapper.className = "message " + (type === "system" ? "system" : type === "error" ? "error" : "");

    const now = new Date().toLocaleTimeString();

    wrapper.innerHTML = `
      <div class="meta">${now}</div>
      <div class="payload">${text}</div>
    `;

    // 👇 NAJNOWSZE NA GÓRZE
    logDiv.prepend(wrapper);
  }

  const client = mqtt.connect("wss://broker.hivemq.com:8884/mqtt");

  client.on("connect", () => {
    document.getElementById("status").innerText = "✅ Połączono";
    addMessage("Połączono z brokerem", "system");

    client.subscribe(topic, (err) => {
      if (!err) {
        addMessage("Subskrypcja: " + topic, "system");
      } else {
        addMessage("Błąd subskrypcji", "error");
      }
    });
  });

  client.on("message", (topic, message) => {
    addMessage("📩 " + topic + ": " + message.toString());
  });

  client.on("error", err => {
    addMessage("❌ " + err, "error");
  });
</script>

</body>
</html>
